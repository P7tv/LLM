# Model Configuration
vocab_size: 151669
hidden_size: 256
num_hidden_layers: 4
num_attention_heads: 8
num_key_value_heads: 2  # Grouped Query Attention ratio (4:1)
head_dim: 32            # 256 / 8 = 32
num_mtp_heads: 1        # 1 MTP head
mtp_lambda: 0.3
intermediate_size: 688  # FFN SwiGLU size
max_position_embeddings: 1024
max_seq_len_sft: 512    # Seq length cap for SFT/DPO (avoid padding to full context)
rope_theta: 1000000.0   # 1M base frequency
rms_norm_eps: 1.0e-5
qk_norm: true           # Qwen3-style QK Normalization stability
sliding_window: 4       # Gemma 4-style local sliding window size (small for testing)
attn_pattern:           # Hybrid attention sequence (3 Local: 1 Global)
  - "local"
  - "local"
  - "local"
  - "global"

# Training Configuration
learning_rate: 5.0e-4
min_learning_rate: 5.0e-5
weight_decay: 0.1
warmup_steps: 100
max_steps: 1000
batch_size: 4
gradient_accumulation_steps: 4
max_grad_norm: 1.0
mixed_precision: "bf16"
device: "auto"
tie_word_embeddings: false # Decouple LM Head weights

# Logging & Checkpoints
logging_steps: 10
eval_steps: 50
save_steps: 100
checkpoint_dir: "checkpoints"
tensorboard_dir: "logs/tensorboard"
wandb_project: "custom_llm_scratch"
wandb_enabled: false
