  - "local"
  - "global"

# Training Settings
learning_rate: 1.5e-4
min_learning_rate: 1.5e-5
weight_decay: 0.1
warmup_steps: 3000
max_steps: 350000
batch_size: 1
gradient_accumulation_steps: 128
max_grad_norm: 1.0
mixed_precision: "bf16"
device: "auto"
tie_word_embeddings: false

# Logging & Checkpoints
logging_steps: 10
eval_steps: 1000
save_steps: 5000
checkpoint_dir: "checkpoints_13b"
tensorboard_dir: "logs_13b/tensorboard"
wandb_project: "thai_llm_13b"
wandb_enabled: false
