# Full 13B Model Configuration
vocab_size: 151669
hidden_size: 5120
num_hidden_layers: 48
num_attention_heads: 40
num_key_value_heads: 8  # Grouped Query Attention ratio (5:1)
head_dim: 128
intermediate_size: 13824  # Qwen2.5-14B Proven Structure
max_position_embeddings: 131072  # 128K Context Window
rope_theta: 1000000.0   # 1M frequency
rms_norm_eps: 1.0e-5
qk_norm: true
sliding_window: 4096
attn_pattern:           # Hybrid attention sequence (3 Local: 1 Global)
  - "local"
  - "local"
  - "local"
  - "global"
