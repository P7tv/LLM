# Main 7B Model Configuration
vocab_size: 151669
hidden_size: 4096
num_hidden_layers: 32
num_attention_heads: 32
num_key_value_heads: 8  # Grouped Query Attention ratio (4:1)
head_dim: 128
intermediate_size: 14336  # Llama 3 Style (~3.5x hidden)
max_position_embeddings: 131072  # 128K Context Window
rope_theta: 1000000.0   # 1M frequency for ultra-long context
rms_norm_eps: 1.0e-5
qk_norm: true           # Qwen3-style QK Normalization stability
sliding_window: 4096    # Gemma 4-style local window size
attn_pattern:           # Hybrid attention sequence (3 Local: 1 Global)
  - "local"
  - "local"
  - "local"
  - "global"
  - "local"
  - "local"
  - "local"
  - "global"
  - "local"
  - "local"
  - "local"
  - "global"
  - "local"
  - "local"
  - "local"
  - "global"
  - "local"
  - "local"
  - "local"
  - "global"
  - "local"
  - "local"
  - "local"
  - "global"
  - "local"
  - "local"
  - "local"
  - "global"
  - "local"
  - "local"
  - "local"
  - "global"

# Training Settings
learning_rate: 2.0e-4
min_learning_rate: 2.0e-5
weight_decay: 0.1
warmup_steps: 2000
max_steps: 250000
batch_size: 1
gradient_accumulation_steps: 64
max_grad_norm: 1.0
mixed_precision: "bf16"
device: "auto"
tie_word_embeddings: false

# Logging & Checkpoints
logging_steps: 10
eval_steps: 500
save_steps: 2000
checkpoint_dir: "checkpoints_7b"
tensorboard_dir: "logs_7b/tensorboard"
wandb_project: "thai_llm_7b"
wandb_enabled: false
