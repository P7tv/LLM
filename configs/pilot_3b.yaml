# Pilot 3B Model Configuration
vocab_size: 151669
hidden_size: 3072
num_hidden_layers: 28
num_attention_heads: 24
num_key_value_heads: 8  # Grouped Query Attention ratio (3:1)
head_dim: 128
intermediate_size: 8192  # Standard SwiGLU (~2.67x hidden)
max_position_embeddings: 32768  # 32K Context Window
rope_theta: 500000.0   # 500k frequency for context window scaling
rms_norm_eps: 1.0e-5
qk_norm: true          # Qwen3-style QK Normalization stability
sliding_window: 4096   # Gemma 4-style local window size
attn_pattern:          # Hybrid attention sequence (3 Local: 1 Global)
  - "local"
  - "local"
  - "local"
  - "global"
  - "local"
  - "local"
  - "local"
  - "global"
  - "local"
  - "local"
  - "local"
  - "global"
  - "local"
  - "local"
  - "local"
  - "global"
  - "local"
  - "local"
  - "local"
  - "global"
  - "local"
  - "local"
  - "local"
  - "global"
  - "local"
  - "local"
  - "local"
  - "global"

# Training Settings
learning_rate: 3.0e-4
min_learning_rate: 3.0e-5
weight_decay: 0.1
warmup_steps: 2000
max_steps: 150000
batch_size: 2
gradient_accumulation_steps: 16
max_grad_norm: 1.0
mixed_precision: "bf16"
device: "auto"
tie_word_embeddings: false # Decouple LM Head weights

# Logging & Checkpoints
logging_steps: 10
eval_steps: 250
save_steps: 1000
checkpoint_dir: "checkpoints_3b"
tensorboard_dir: "logs_3b/tensorboard"
wandb_project: "thai_llm_3b"
wandb_enabled: false
